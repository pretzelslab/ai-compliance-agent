name: AI Compliance Check

on:
  schedule:
    - cron: '0 9 * * 1'
  push:
    paths:
      - 'pipeline.py'
      - 'agent.py'
  workflow_dispatch:

jobs:
  compliance-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run audit pipeline
        run: python pipeline.py

      - name: Test API key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_COMPLIANCE }}
        run: python -c "import os,anthropic; key=os.environ.get('ANTHROPIC_API_KEY','');
print(f'len={len(key)} prefix={key[:8]}'); anthropic.Anthropic(api_key=key).messages.create(mo
del='claude-haiku-4-5-20251001',max_tokens=10,messages=[{'role':'user','content':'hi'}]);
print('OK')"

      - name: Run compliance agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_COMPLIANCE }}
        run: python agent.py

      - name: Commit outputs to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add data/audit_report.json reports/
          git diff --staged --quiet || git commit -m "chore: automated compliance check"
          git push --force-with-lease
